<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butter Town - Shio Pan Preorder</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #faf7f2; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: white; min-height: 75vh; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; box-sizing: border-box; }
        .page { display: none; } .page.active { display: block; }
        h1, h2 { color: #8b5a2b; margin-top: 0; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; background: #fff; display: flex; flex-direction: column; justify-content: space-between; }
        .item-title { font-weight: bold; margin-top: 8px; font-size: 0.95rem; min-height: 44px; }
        .item-price { color: #666; font-size: 0.9rem; margin-top: 4px; font-weight: 600; }
        .qty-stepper { display: flex; align-items: center; justify-content: space-between; border: 1px solid #cbd5e1; border-radius: 20px; padding: 4px 12px; width: 100px; margin: 12px auto 0 auto; }
        .qty-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #333; }
        .form-group { margin-bottom: 15px; } label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; color: #8b5a2b; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .radio-option { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; }
        .btn { width: 100%; background: #8b5a2b; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn:disabled { opacity: 0.5; }
        .qr-box { width: 180px; height: 180px; background: #eee; margin: 15px auto; display: flex; justify-content: center; align-items: center; border: 2px dashed #bbb; border-radius: 12px; }
        .success-icon { font-size: 4rem; color: #4ade80; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="page1" class="page active">
        <h2>Shio Pan Sets</h2>
        <div class="menu-grid" id="menu"></div>
        <div style="text-align:right; margin-top:20px; font-weight:bold;">Total: <span id="p1-total">$0.00</span></div>
        <button class="btn" onclick="goToPage(2)" id="nextBtn" disabled>Next: Checkout</button>
    </div>

    <div id="page2" class="page">
        <h2>Checkout Details</h2>
        <form id="orderForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group"><label>Name *</label><input type="text" id="custName" required></div>
            <div class="form-group"><label>WhatsApp *</label><input type="tel" id="custPhone" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="custEmail"></div>
            <label>Collection Method *</label>
            <div class="radio-option"><input type="radio" name="delivery" value="Mactaggart" checked> Mactaggart</div>
            <div class="radio-option"><input type="radio" name="delivery" value="Holland Drive"> Holland Drive</div>
            <button type="submit" class="btn">Proceed to Payment</button>
        </form>
    </div>

    <div id="page3" class="page" style="text-align:center;">
        <h2>Scan & Pay</h2>
        <div class="qr-box"><img src="tng-qr.png" alt="QR" style="width:100%"></div>
        <input type="file" id="receiptFile" accept="image/*" required onchange="document.getElementById('completeOrderBtn').disabled=false">
        <button id="completeOrderBtn" class="btn" disabled onclick="finalizeOrderAndLockSheet()">Verify & Complete</button>
    </div>

    <div id="page4" class="page" style="text-align:center;">
        <div class="success-icon">✓</div>
        <h2>Order Confirmed!</h2>
        <p>Your order is logged. We'll be in touch via WhatsApp.</p>
        <button class="btn" onclick="window.location.reload()">New Order</button>
    </div>
</div>

<script>
    // --- PERSONALIZED CONFIGURATION ---
    const GOOGLE_FORM_ID = "1FAIpQLSdFHPNDMeSIzx29M3g41t-7h8RQWsYr1unWqorwVT7NP-y6Hg"; 
    const NAME_ENTRY   = "entry.752256232";
    const PHONE_ENTRY  = "entry.1480684134";
    const EMAIL_ENTRY  = "entry.1115728136";
    const BASKET_ENTRY = "entry.2143900448";
    const TOTAL_ENTRY  = "entry.1929353025";
    const METHOD_ENTRY = "entry.2053930896";

    const menuItems = { choc: { name: "Au chocolat", price: 8.4 }, garlic: { name: "Garlic", price: 8.4 }, bacon: { name: "Bacon", price: 9.0 }, azuki: { name: "Azuki", price: 9.6 } };
    for (let k in menuItems) menuItems[k].qty = 0;

    let totalOrderPrice = 0, pendingOrderData = null;

    function changeQty(key, change) {
        menuItems[key].qty = Math.max(0, menuItems[key].qty + change);
        document.getElementById(`qty-${key}`).innerText = menuItems[key].qty;
        calculateTotals();
    }

    function calculateTotals() {
        totalOrderPrice = 0; let count = 0;
        for (let k in menuItems) { totalOrderPrice += menuItems[k].qty * menuItems[k].price; count += menuItems[k].qty; }
        document.getElementById('p1-total').innerText = `$${totalOrderPrice.toFixed(2)}`;
        document.getElementById('nextBtn').disabled = (count === 0);
    }

    function goToPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById(`page${p}`).classList.add('active');
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        pendingOrderData = { name: document.getElementById('custName').value, phone: document.getElementById('custPhone').value, email: document.getElementById('custEmail').value, method: document.querySelector('input[name="delivery"]:checked').value };
        goToPage(3);
    }

    function finalizeOrderAndLockSheet() {
        const btn = document.getElementById('completeOrderBtn');
        btn.innerText = "Saving...";
        
        let basket = "";
        for (let k in menuItems) if (menuItems[k].qty > 0) basket += `${menuItems[k].name} x${menuItems[k].qty}; `;

        const formData = new FormData();
        formData.append(NAME_ENTRY, pendingOrderData.name);
        formData.append(PHONE_ENTRY, pendingOrderData.phone);
        formData.append(EMAIL_ENTRY, pendingOrderData.email);
        formData.append(BASKET_ENTRY, basket);
        formData.append(TOTAL_ENTRY, totalOrderPrice.toFixed(2));
        formData.append(METHOD_ENTRY, pendingOrderData.method);

        fetch(`https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`, {
            method: "POST", mode: "no-cors", body: formData
        }).then(() => goToPage(4)).catch(() => alert("Error saving data."));
    }

    let menuHtml = "";
    for(let k in menuItems) menuHtml += `<div class="menu-card">${menuItems[k].name}<div class="qty-stepper"><button class="qty-btn" onclick="changeQty('${k}',-1)">-</button><span id="qty-${k}">0</span><button class="qty-btn" onclick="changeQty('${k}',1)">+</button></div></div>`;
    document.getElementById('menu').innerHTML = menuHtml;
</script>
</body>
</html>
